name: Release Please

# Automatiza criação de Release PRs e GitHub Releases
# baseado em commits convencionais (feat, fix, etc.)
#
# IMPORTANTE: Usa RELEASE_PAT (Personal Access Token) em vez de GITHUB_TOKEN
# para que as releases criadas acionem outros workflows (ex: npm-publish).
# Limitação do GitHub: eventos gerados por GITHUB_TOKEN não disparam workflows.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT permite que releases criadas acionem o workflow npm-publish
          token: ${{ secrets.RELEASE_PAT }}
