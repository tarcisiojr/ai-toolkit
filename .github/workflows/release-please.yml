name: Release Please

# Automatiza criação de Release PRs e GitHub Releases
# baseado em commits convencionais (feat, fix, etc.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Usa configuração manifest para monorepo
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Token padrão do GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
