name: Vercel Deploy

# Deploy automatico para Vercel apos CI passar na main
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy para producao
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --force --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Resumo do deploy
        run: |
          echo "## Vercel Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** Sucesso" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.event.workflow_run.head_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
